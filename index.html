<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#149aaf" />
  <title>BioBalance</title>

  <!-- Manrope (design system typeface) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/gradients.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Device frame: iPhone 14 (390 x 844). On real mobile it fills the screen. -->
  <div class="device" role="application" aria-label="BioBuddy">
    <div class="screen" id="screen">

      <!-- App content goes here. Build screens inside .app -->
      <main class="app" id="app">
        <section class="view" data-view="home">
          <header class="app-header">
            <h1 class="app-title">BioBalance</h1>
          </header>
          <div class="app-body">
            <p class="placeholder">Design system wired in. Ready to build screens.</p>
          </div>
        </section>
      </main>

      <!-- Optional bottom navigation placeholder -->
      <nav class="tab-bar" id="tabBar" aria-label="Main navigation"></nav>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>BioBuddy</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Device frame: iPhone 14 (390 x 844). On real mobile it fills the screen. -->
  <div class="device" role="application" aria-label="BioBuddy">
    <div class="screen" id="screen">

      <!-- App content goes here. Build screens inside .app -->
      <main class="app" id="app">
        <section class="view" data-view="home">
          <header class="app-header">
            <h1 class="app-title">BioBuddy</h1>
          </header>
          <div class="app-body">
            <p class="placeholder">Project scaffold ready. Drop your design system &amp; screens here.</p>
          </div>
        </section>
      </main>

      <!-- Optional bottom navigation placeholder -->
      <nav class="tab-bar" id="tabBar" aria-label="Main navigation"></nav>

    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
